<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vacation & Activity Tracker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }

    h1 {
      font-size: 24px;
      color: #2c3e50;
      margin-bottom: 12px;
    }

    p {
      font-size: 15px;
      color: #555;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .btn {
      display: inline-block;
      background-color: #2c3e50;
      color: white;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 6px;
      font-size: 15px;
      font-weight: bold;
    }

    .note {
      margin-top: 20px;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Vacation &amp; Activity Tracker</h1>
    <p>
      A simple Android app for managing your events and activities.
      Create events, add activities, and search your records — all stored locally on your device.
    </p>
    <a class="btn" href="https://github.com/lablae/vacation-activity-tracker/raw/main/app-release.apk" download>
      Download APK
    </a>
    <div class="note">Requires Android 8.0 or higher. Allow installation from unknown sources when prompted.</div>
  </div>
</body>
</html>
